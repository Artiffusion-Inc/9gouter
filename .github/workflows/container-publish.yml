name: Build and Push Container Image

# Builds the distroless multi-arch (amd64+arm64) container image and pushes
# it to GHCR only. Triggered by a version tag (v*) or manual dispatch.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  go-test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      # Build the Next.js dashboard static export so the //go:embed
      # all:dashboard_assets pattern in internal/adapter/transport/http has
      # real files to embed. Mirrors Containerfile stage 1.
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: "1.3"

      - name: Install dashboard deps
        run: bun install --frozen-lockfile

      - name: Build dashboard static export
        run: bash scripts/build-dashboard.sh

      - name: Run Go tests with race detector
        run: go test -race ./...

      - name: Build Go binary
        run: go build -o 9gouter ./cmd/9gouter

      - name: Cross-compile for linux/arm64
        run: CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -o 9gouter-linux-arm64 ./cmd/9gouter

  container-build-and-push:
    needs: go-test-build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Lowercase GHCR owner
        id: ghcr
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.ghcr.outputs.owner }}/9gouter
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Containerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=ghcr.io/${{ steps.ghcr.outputs.owner }}/9gouter:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ steps.ghcr.outputs.owner }}/9gouter:buildcache,mode=max
          platforms: linux/amd64,linux/arm64
          provenance: false
          sbom: false